<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="人情记账本" />
  <meta name="theme-color" content="#f7f8fb" />
  <title>人情记账本 · Gift Ledger</title>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <style>
    :root {
      --bg:#f7f8fb; --card:rgba(255,255,255,.94); --solid:#fff; --text:#172033; --muted:#6f7787;
      --line:#e7eaf0; --primary:#2563eb; --primary-soft:#e8f0ff; --green:#16a34a; --green-soft:#eaf8ef;
      --red:#dc2626; --red-soft:#fff0f0; --yellow-soft:#fff7df; --shadow:0 10px 30px rgba(15,23,42,.08);
      --radius:18px; --safe-top:env(safe-area-inset-top,0px); --safe-bottom:env(safe-area-inset-bottom,0px);
    }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html, body { width:100%; min-height:100%; max-width:100%; overflow-x:hidden; background:var(--bg); color:var(--text); }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,"PingFang SC","Microsoft YaHei",sans-serif; touch-action:pan-y; overscroll-behavior-x:none; }
    body.modal-open { overflow:hidden; }
    button,input,select,textarea { font:inherit; font-size:16px; min-width:0; }
    button { border:none; cursor:pointer; }
    .app-shell { width:100%; max-width:1240px; margin:0 auto; padding:calc(14px + var(--safe-top)) 16px calc(82px + var(--safe-bottom)); overflow-x:hidden; }
    .topbar { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:12px; position:relative; }
    .brand { min-width:0; }
    .brand-title { display:flex; align-items:baseline; gap:8px; flex-wrap:wrap; }
    .brand h1 { margin:0; font-size:24px; letter-spacing:-.03em; }
    .version { color:var(--muted); font-size:13px; font-weight:800; }
    .subtitle { color:var(--muted); font-size:13px; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .toolbar { display:flex; align-items:center; gap:8px; flex-shrink:0; }
    .btn { min-height:38px; padding:8px 12px; border-radius:12px; background:var(--solid); color:var(--text); border:1px solid var(--line); box-shadow:0 1px 0 rgba(15,23,42,.03); font-weight:800; display:inline-flex; align-items:center; justify-content:center; gap:6px; }
    .btn.primary { background:var(--primary); color:#fff; border-color:var(--primary); }
    .btn.soft { background:var(--primary-soft); color:var(--primary); border-color:#cfe0ff; }
    .btn.danger { background:var(--red-soft); color:var(--red); border-color:#ffd6d6; }
    .btn.ghost { background:transparent; border-color:transparent; box-shadow:none; }
    .icon-btn { width:40px; min-width:40px; padding:0; font-size:18px; }
    .more-menu { position:absolute; right:0; top:46px; width:240px; z-index:80; display:none; padding:8px; border:1px solid var(--line); background:var(--solid); border-radius:16px; box-shadow:var(--shadow); }
    .more-menu.open { display:grid; gap:6px; }
    .more-menu .btn { width:100%; justify-content:flex-start; }
    .sync-line { display:flex; align-items:center; gap:8px; min-height:34px; padding:7px 10px; border:1px solid var(--line); border-radius:14px; background:rgba(255,255,255,.75); color:var(--muted); font-size:13px; margin-bottom:10px; overflow:hidden; }
    .sync-dot { width:8px; height:8px; border-radius:99px; background:#94a3b8; flex:0 0 auto; }
    .sync-dot.ok{background:var(--green)} .sync-dot.warn{background:#f59e0b} .sync-dot.err{background:var(--red)}
    .sync-text { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .cards { display:grid; grid-template-columns:repeat(6,minmax(0,1fr)); gap:10px; margin-bottom:12px; }
    .stat-card { background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:12px; box-shadow:0 6px 20px rgba(15,23,42,.04); min-height:82px; }
    .stat-label { color:var(--muted); font-size:12px; font-weight:800; margin-bottom:8px; }
    .stat-value { font-size:18px; line-height:1.2; font-weight:950; letter-spacing:-.02em; word-break:break-word; }
    .stat-card.in .stat-value{color:var(--green)} .stat-card.out .stat-value{color:var(--red)} .stat-card.net .stat-value{color:var(--primary)}
    .panel { background:var(--card); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); }
    .filter-panel { padding:12px; margin-bottom:12px; }
    .filter-grid { display:grid; grid-template-columns:1.2fr .75fr .75fr .85fr .85fr auto; gap:8px; align-items:center; }
    .field { display:grid; gap:5px; min-width:0; }
    .field label { color:var(--muted); font-size:12px; font-weight:850; }
    .input,.select,.textarea { width:100%; max-width:100%; border:1px solid var(--line); background:#fff; color:var(--text); border-radius:12px; padding:10px 11px; outline:none; min-height:42px; }
    .input[readonly] { color:#475569; background:#f8fafc; }
    .textarea { min-height:86px; resize:vertical; }
    .input:focus,.select:focus,.textarea:focus { border-color:#93b4ff; box-shadow:0 0 0 3px rgba(37,99,235,.10); }
    .table-card { overflow:hidden; }
    .table-tools { display:flex; align-items:center; justify-content:space-between; gap:8px; padding:12px; border-bottom:1px solid var(--line); }
    .table-title { font-weight:950; }
    .table-count { color:var(--muted); font-size:13px; }
    .table-wrap { overflow-x:auto; }
    table { width:100%; border-collapse:collapse; min-width:1100px; }
    th,td { padding:10px 12px; border-bottom:1px solid var(--line); text-align:left; vertical-align:middle; white-space:nowrap; }
    th { color:var(--muted); font-size:12px; background:#fbfcff; position:sticky; top:0; z-index:1; }
    td { font-size:14px; }
    .badge { display:inline-flex; align-items:center; gap:4px; padding:4px 8px; border-radius:999px; font-size:12px; font-weight:850; }
    .badge.received{color:var(--green);background:var(--green-soft)} .badge.given{color:var(--red);background:var(--red-soft)} .badge.holiday{color:#9a6400;background:var(--yellow-soft)} .badge.red_packet{color:#be123c;background:#fff1f4}
    .amount.in { color:var(--green); font-weight:950; } .amount.out { color:var(--red); font-weight:950; }
    .row-actions { display:flex; gap:6px; flex-wrap:wrap; }
    .mini-btn { padding:6px 8px; border-radius:10px; border:1px solid var(--line); background:#fff; color:var(--text); font-weight:850; }
    .mini-btn.danger { color:var(--red); background:var(--red-soft); border-color:#ffd6d6; }
    .mobile-list { display:none; gap:10px; width:100%; overflow-x:hidden; }
    .mobile-card { width:100%; max-width:100%; background:var(--card); border:1px solid var(--line); border-radius:18px; padding:12px; box-shadow:0 6px 20px rgba(15,23,42,.04); overflow:hidden; }
    .mobile-card-top { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; margin-bottom:8px; }
    .person-title { font-size:17px; font-weight:950; letter-spacing:-.02em; word-break:break-word; }
    .mobile-meta { color:var(--muted); font-size:13px; margin-top:3px; word-break:break-word; }
    .mobile-amount { font-size:18px; font-weight:950; white-space:nowrap; }
    .mobile-info { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin:10px 0; }
    .info-box { border-radius:14px; background:#f8fafc; padding:8px; min-width:0; }
    .info-label { color:var(--muted); font-size:11px; font-weight:850; margin-bottom:3px; }
    .info-value { font-weight:850; font-size:13px; word-break:break-word; }
    .empty { text-align:center; padding:32px 12px; color:var(--muted); }
    .modal-mask { position:fixed; inset:0; z-index:100; display:none; align-items:center; justify-content:center; background:rgba(15,23,42,.45); padding:calc(16px + var(--safe-top)) 16px calc(16px + var(--safe-bottom)); }
    .modal-mask.open { display:flex; }
    .modal { width:min(780px,100%); max-height:min(88dvh,840px); overflow:hidden; background:var(--solid); border-radius:22px; box-shadow:0 20px 60px rgba(15,23,42,.25); display:grid; grid-template-rows:auto 1fr auto; }
    .modal.large { width:min(1080px,100%); }
    .modal-head { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:14px 16px; border-bottom:1px solid var(--line); }
    .modal-title { font-size:18px; font-weight:950; }
    .modal-body { padding:14px 16px; overflow:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; }
    .modal-foot { display:flex; justify-content:flex-end; gap:8px; padding:12px 16px; border-top:1px solid var(--line); background:#fbfcff; flex-wrap:wrap; }
    .form-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px; }
    .form-grid .full { grid-column:1/-1; }
    .section-title { margin:18px 0 8px; font-size:15px; font-weight:950; color:#334155; }
    .manager-list { display:grid; gap:8px; margin-top:12px; }
    .manager-row { display:grid; grid-template-columns:1fr 1fr 1fr auto; gap:8px; align-items:center; padding:8px; border:1px solid var(--line); border-radius:14px; background:#fbfcff; }
    .people-row { grid-template-columns:1fr 1fr auto; }
    .option-row { grid-template-columns:1fr auto; }
    .event-row { grid-template-columns:.8fr 1fr 1fr auto; }
    .category-row { grid-template-columns:.75fr 1fr 1fr .85fr auto; }
    .rule-row { grid-template-columns:1fr .8fr .8fr auto; }
    .option-row { grid-template-columns:1fr auto; }
    .rate-row { grid-template-columns:1fr 1fr auto; }
    .history-row,.trash-row { display:grid; grid-template-columns:.8fr 1fr 1fr .8fr .8fr auto; gap:8px; align-items:center; padding:8px; border:1px solid var(--line); border-radius:14px; background:#fbfcff; font-size:13px; }
    .chart-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .chart-box { border:1px solid var(--line); border-radius:16px; padding:12px; background:#fbfcff; min-width:0; }
    .chart-title { font-weight:950; margin-bottom:10px; }
    .bar-row { display:grid; grid-template-columns:120px 1fr auto; gap:8px; align-items:center; margin:8px 0; font-size:13px; }
    .bar-name { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:#334155; }
    .bar-track { height:12px; border-radius:99px; background:#e5e7eb; overflow:hidden; }
    .bar-fill { height:100%; border-radius:99px; background:var(--primary); min-width:2px; }
    .bar-value { color:var(--muted); white-space:nowrap; }
    .float-actions { display:none; }
    .mobile-filter-btn { display:none; }
    .hidden { display:none!important; }
    #importFile { display:none; }
    @media (max-width:980px){ .cards{grid-template-columns:repeat(3,minmax(0,1fr));} .filter-grid{grid-template-columns:repeat(3,minmax(0,1fr));} .chart-grid{grid-template-columns:1fr;} }
    @media (max-width:720px){
      .app-shell { padding:calc(8px + var(--safe-top)) 10px calc(76px + var(--safe-bottom)); }
      .topbar { align-items:flex-start; }
      .brand h1 { font-size:20px; }
      .subtitle { max-width:58vw; font-size:12px; }
      .toolbar .text-label { display:none; } .toolbar{gap:6px;} .btn{min-height:36px;padding:7px 9px;border-radius:11px;} .icon-btn{width:38px;min-width:38px;}
      .cards { grid-template-columns:repeat(2,minmax(0,1fr)); gap:8px; }
      .stat-card { padding:10px; min-height:72px; border-radius:16px; }
      .stat-value { font-size:15px; }
      .filter-panel { display:none; position:fixed; left:10px; right:10px; top:calc(62px + var(--safe-top)); z-index:50; box-shadow:0 20px 60px rgba(15,23,42,.22); }
      .filter-panel.open { display:block; }
      .filter-grid { grid-template-columns:1fr 1fr; }
      .filter-grid .filter-keyword { grid-column:1/-1; }
      .desktop-table { display:none; }
      .mobile-list { display:grid; }
      .table-card { background:transparent; border:none; box-shadow:none; width:100%; overflow-x:hidden; }
      .table-tools { background:var(--card); border:1px solid var(--line); border-radius:18px; margin-bottom:10px; padding:10px; }
      .mobile-filter-btn { display:inline-flex; }
      .modal-mask { padding:0; align-items:stretch; }
      .modal,.modal.large { width:100%; min-height:100dvh; max-height:100dvh; border-radius:0; }
      .modal-head { padding-top:calc(12px + var(--safe-top)); }
      .modal-foot { padding-bottom:calc(12px + var(--safe-bottom)); }
      .form-grid { grid-template-columns:1fr; gap:10px; }
      .manager-row,.event-row,.category-row,.rule-row,.option-row,.rate-row,.history-row,.trash-row { grid-template-columns:1fr; }
      .input[type="date"] { width:100%; min-width:0; max-width:100%; padding-left:10px; padding-right:6px; }
      .float-actions { position:fixed; right:12px; bottom:calc(14px + var(--safe-bottom)); z-index:40; display:grid; gap:8px; }
      .float-actions .btn { width:46px; height:46px; min-height:46px; border-radius:16px; font-size:20px; box-shadow:var(--shadow); }
      .topbar .toolbar { display:none; }
      .more-menu { position:fixed; right:12px; bottom:calc(216px + var(--safe-bottom)); top:auto; width:240px; max-height:56vh; overflow:auto; z-index:80; }
      .bar-row { grid-template-columns:88px 1fr; }
      .bar-value { grid-column:2; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-title"><h1 data-i18n="appTitle">人情记账本</h1><span class="version">v1.1.7</span></div>
        <div class="subtitle" data-i18n="subtitle">收人情、封人情、节日红包统一记录</div>
      </div>
      <div class="toolbar">
        <button class="btn soft" id="btnLang">🌐 <span class="text-label">中文</span></button>
        <button class="btn soft" id="btnSync">↻ <span class="text-label" data-i18n="sync">同步</span></button>
        <button class="btn primary" id="btnAdd">＋ <span class="text-label" data-i18n="addRecord">新增</span></button>
        <button class="btn icon-btn" id="btnMore">⋯</button>
      </div>
      <div class="more-menu" id="moreMenu">
        <button class="btn ghost" id="btnSettings">⚙️ <span data-i18n="settings">设置</span></button>
        <button class="btn ghost" id="btnPeople">👥 <span data-i18n="peopleManage">人员管理</span></button>
        <button class="btn ghost" id="btnOptions">🧩 <span data-i18n="optionManage">关系配置</span></button>
        <button class="btn ghost" id="btnCategories">📂 <span data-i18n="categoryManage">分类配置</span></button>
        <button class="btn ghost" id="btnEvents">🏷️ <span data-i18n="eventManage">类型管理</span></button>
        <button class="btn ghost" id="btnRules">🧧 <span data-i18n="ruleManage">红包规则</span></button>
        <button class="btn ghost" id="btnRates">💱 <span data-i18n="rateManage">汇率设置</span></button>
        <button class="btn ghost" id="btnCharts">📊 <span data-i18n="chartStats">统计图表</span></button>
        <button class="btn ghost" id="btnTrash">♻️ <span data-i18n="trash">回收站</span></button>
        <button class="btn ghost" id="btnExportCsv">📤 <span data-i18n="exportCsv">导出CSV</span></button>
        <button class="btn ghost" id="btnImportCsv">📥 <span data-i18n="importCsv">导入CSV</span></button>
        <button class="btn ghost" id="btnDownloadJson">⬇️ <span data-i18n="downloadData">下载数据</span></button>
      </div>
    </header>

    <div class="sync-line"><span class="sync-dot" id="syncDot"></span><span class="sync-text" id="syncText">Loading...</span></div>
    <section class="cards" id="statsCards"></section>

    <section class="filter-panel panel" id="filterPanel">
      <div class="filter-grid">
        <div class="field filter-keyword"><label data-i18n="keyword">关键词</label><input class="input" id="filterKeyword" placeholder="姓名 / 备注" /></div>
        <div class="field"><label data-i18n="category">分类</label><select class="select" id="filterCategory"></select></div>
        <div class="field"><label data-i18n="direction">方向</label><select class="select" id="filterDirection"></select></div>
        <div class="field"><label data-i18n="startDate">开始日期</label><input class="input" type="date" id="filterStart" /></div>
        <div class="field"><label data-i18n="endDate">结束日期</label><input class="input" type="date" id="filterEnd" /></div>
        <div class="field"><label>&nbsp;</label><button class="btn" id="btnClearFilter" data-i18n="clear">清空</button></div>
      </div>
    </section>

    <section class="table-card panel">
      <div class="table-tools">
        <div><div class="table-title" data-i18n="recordList">记录列表</div><div class="table-count" id="recordCount">0</div></div>
        <button class="btn mobile-filter-btn" id="btnMobileFilter">🔎 <span data-i18n="filter">筛选</span></button>
      </div>
      <div class="table-wrap desktop-table">
        <table>
          <thead><tr>
            <th data-i18n="date">日期</th><th data-i18n="person">姓名</th><th data-i18n="relation">关系</th><th data-i18n="category">分类</th><th data-i18n="eventType">事件类型</th><th data-i18n="direction">方向</th><th data-i18n="amount">金额</th><th data-i18n="returnAmount">回礼金额</th><th data-i18n="actualAmount">实际金额</th><th data-i18n="note">备注</th><th data-i18n="actions">操作</th>
          </tr></thead>
          <tbody id="recordsTbody"></tbody>
        </table>
      </div>
      <div class="mobile-list" id="mobileList"></div>
    </section>
  </div>

  <div class="float-actions">
    <button class="btn soft" id="floatLang">🌐</button>
    <button class="btn soft" id="floatSync">↻</button>
    <button class="btn primary" id="floatAdd">＋</button>
    <button class="btn" id="floatMore">⋯</button>
  </div>

  <input type="file" id="importFile" accept=".csv,text/csv" />

  <div class="modal-mask" id="recordModal"><div class="modal">
    <div class="modal-head"><div class="modal-title" id="recordModalTitle" data-i18n="addRecord">新增</div><button class="btn icon-btn close-modal">×</button></div>
    <div class="modal-body"><form id="recordForm" class="form-grid">
      <input type="hidden" id="recordId" />
      <div class="field"><label data-i18n="date">日期</label><input class="input" type="date" id="recordDate" required /></div>
      <div class="field"><label data-i18n="category">分类</label><select class="select" id="recordCategory" required></select></div>
      <div class="field"><label data-i18n="direction">方向</label><select class="select" id="recordDirection" required></select></div>
      <div class="field"><label data-i18n="eventType">事件类型</label><select class="select" id="recordEventType" required></select></div>
      <div class="field"><label data-i18n="person">姓名</label><select class="select" id="recordPersonId" required></select></div>
      <div class="field"><label data-i18n="relation">关系</label><input class="input" id="recordRelation" readonly /></div>
      <div class="field"><label data-i18n="redPacketRule">红包规则</label><select class="select" id="recordRule"></select></div>
      <div class="field"><label data-i18n="amount">金额</label><input class="input" type="number" step="0.01" id="recordAmount" required /></div>
      <div class="field"><label data-i18n="currency">货币</label><input class="input" id="recordCurrency" maxlength="8" /></div>
      <div class="field"><label data-i18n="returnAmount">回礼金额</label><input class="input" type="number" step="0.01" id="recordReturnAmount" /></div>
      <div class="field"><label data-i18n="actualAmount">实际金额</label><input class="input" id="recordActual" readonly /></div>
      <div class="field full"><label data-i18n="note">备注</label><textarea class="textarea" id="recordNote"></textarea></div>
    </form></div>
    <div class="modal-foot"><button class="btn close-modal" data-i18n="cancel">取消</button><button class="btn primary" id="btnSaveRecord" data-i18n="save">保存</button></div>
  </div></div>

  <div class="modal-mask" id="settingsModal"><div class="modal">
    <div class="modal-head"><div class="modal-title" data-i18n="settings">设置</div><button class="btn icon-btn close-modal">×</button></div>
    <div class="modal-body"><div class="form-grid">
      <div class="field full"><label data-i18n="cloudflareUrl">Cloudflare Worker 地址</label><input class="input" id="settingCloudUrl" placeholder="https://xxx.workers.dev" /></div>
      <div class="field full"><label data-i18n="accessPassword">访问密码</label><input class="input" id="settingPassword" type="password" placeholder="APP_PASSWORD" /></div>
      <div class="field"><label data-i18n="defaultCurrency">默认货币</label><input class="input" id="settingCurrency" placeholder="CNY" /></div>
      <div class="field"><label data-i18n="baseCurrency">折算基准货币</label><input class="input" id="settingBaseCurrency" placeholder="CNY" /></div>
      <div class="field"><label data-i18n="language">语言</label><select class="select" id="settingLanguage"><option value="zh">中文</option><option value="en">English</option></select></div>
    </div><p style="color:var(--muted);font-size:13px;line-height:1.6;margin:14px 0 0" data-i18n="settingsTip">设置会保存到 data.json，也会在本设备缓存一份，方便第一次打开时自动同步。</p></div>
    <div class="modal-foot"><button class="btn close-modal" data-i18n="cancel">取消</button><button class="btn primary" id="btnSaveSettings" data-i18n="save">保存</button></div>
  </div></div>

  <div class="modal-mask" id="peopleModal"><div class="modal large">
    <div class="modal-head"><div class="modal-title" data-i18n="peopleManage">人员管理</div><button class="btn icon-btn close-modal">×</button></div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="field"><label data-i18n="person">姓名</label><input class="input" id="personNameInput" /></div>
        <div class="field"><label data-i18n="relation">关系</label><select class="select" id="personRelationInput"></select></div>

  async function loadCloudData(silent){

      const json=await res.json();

      rememberRemoteMeta(json);
      const incomingData=json.data||json;
      const hadLegacyGroup=hasLegacyGroupFields(incomingData);
      const localCloud=clone(state.data.settings.cloud||{});
      state.data=mergeData(incomingData);
      const finalCloud=mergeCloudConfig(state.data.cloudConfig,state.data.settings.cloud,localCloud);

      rememberRemoteMeta(json);

  function csvEscape(v){ v=String(v??''); return /[",\n]/.test(v)?`"${v.replace(/"/g,'""')}"`:v; }
  function exportCsv(){ const headers=['date','personName','relation','category','direction','eventType','amount','currency','returnAmount','note']; const rows=[headers.join(',')].concat(state.data.records.map(r=>headers.map(h=>csvEscape(r[h]||'')).join(','))); const blob=new Blob(['\ufeff'+rows.join('\n')],{type:'text/csv;charset=utf-8'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='renqing-ledger-records.csv'; a.click(); URL.revokeObjectURL(a.href); }
  function parseCsv(text){ const rows=[]; let row=[], cur='', q=false; for(let i=0;i<text.length;i++){ const ch=text[i], nx=text[i+1]; if(q){ if(ch==='"'&&nx==='"'){cur+='"';i++;} else if(ch==='"') q=false; else cur+=ch; } else { if(ch==='"') q=true; else if(ch===','){row.push(cur);cur='';} else if(ch==='\n'){row.push(cur);rows.push(row);row=[];cur='';} else if(ch!=='\r') cur+=ch; } } row.push(cur); rows.push(row); return rows.filter(r=>r.some(c=>String(c).trim()!=='')); }
  function importCsvFile(file){ const reader=new FileReader(); reader.onload=()=>{ try{ const rows=parseCsv(String(reader.result||'').replace(/^\ufeff/,'')); const head=rows.shift().map(h=>h.trim()); rows.forEach(cols=>{ const o={}; head.forEach((h,i)=>o[h]=cols[i]||''); const p=findOrCreatePersonIn(state.data,o.personName||o.name||'',o.relation||'其他'); if(!p.name)return; state.data.records.push({id:uid('r'),date:o.date||today(),personId:p.id,personName:p.name,relation:p.relation,category:o.category||'given',direction:o.direction||((o.category==='received')?'received':'given'),eventType:o.eventType||'other',amount:num(o.amount),currency:(o.currency||state.data.settings.defaultCurrency||'CNY').toUpperCase(),returnAmount:num(o.returnAmount),actualAmount:Math.max(0,num(o.amount)-num(o.returnAmount)),note:o.note||'',createdAt:nowText(),updatedAt:nowText()}); }); saveAndRender(true); setStatus(t('importDone')+' · '+nowText(),'ok'); }catch(e){ setStatus(t('importFailed')+': '+e.message,'err'); } }; reader.readAsText(file,'UTF-8'); }
  function bindEvents(){
    $('#btnAdd,#floatAdd').on('click',openAddRecord); $('#btnMore,#floatMore').on('click',e=>{e.stopPropagation();$('#moreMenu').toggleClass('open');}); $(document).on('click',e=>{if(!$(e.target).closest('#moreMenu,#btnMore,#floatMore').length)$('#moreMenu').removeClass('open');});
    $('#btnLang,#floatLang').on('click',()=>{state.data.settings.language=state.data.settings.language==='zh'?'en':'zh';saveAndRender(true);}); $('#btnSync,#floatSync').on('click',()=>loadCloudData(false));
    $('#btnSettings').on('click',openSettings); $('#btnPeople').on('click',()=>{renderPeopleManager();openModal('#peopleModal');}); $('#btnOptions').on('click',()=>{renderOptionsManager();openModal('#optionsModal');}); $('#btnCategories').on('click',()=>{renderCategoryManager();openModal('#categoriesModal');}); $('#btnEvents').on('click',()=>{renderEventManager();openModal('#eventsModal');}); $('#btnRules').on('click',()=>{renderRuleManager();openModal('#rulesModal');}); $('#btnRates').on('click',()=>{renderRates();openModal('#ratesModal');}); $('#btnCharts').on('click',()=>{renderCharts();openModal('#chartsModal');}); $('#btnTrash').on('click',()=>{renderTrash();openModal('#trashModal');});
    $('#btnExportCsv').on('click',exportCsv); $('#btnImportCsv').on('click',()=>$('#importFile').click()); $('#importFile').on('change',function(){ if(this.files&&this.files[0]) importCsvFile(this.files[0]); this.value=''; });
    $('#btnMobileFilter').on('click',()=>$('#filterPanel').toggleClass('open')); $('.close-modal').on('click',closeModal); $('.modal-mask').on('click',function(e){if(e.target===this)closeModal();});
    $('#btnSaveRecord').on('click',saveRecord); $('#recordAmount,#recordReturnAmount,#recordCurrency').on('input change',calcRecordPreview); $('#recordPersonId').on('change',fillPersonReadonly); $('#recordCategory').on('change',function(){ syncDirectionByCategory(); if(this.value==='red_packet'&&state.data.redPacketRules.length&&!$('#recordRule').val()) $('#recordRule').val(state.data.redPacketRules[0].id).trigger('change'); }); $('#recordRule').on('change',function(){ const r=state.data.redPacketRules.find(x=>x.id===this.value); if(r){$('#recordAmount').val(r.amount);$('#recordCurrency').val(r.currency||state.data.settings.defaultCurrency||'CNY');calcRecordPreview();} });
    $('#filterKeyword,#filterCategory,#filterDirection,#filterStart,#filterEnd').on('input change',renderRecords); $('#btnClearFilter').on('click',()=>{$('#filterKeyword').val('');$('#filterCategory').val('all');$('#filterDirection').val('all');$('#filterStart').val('');$('#filterEnd').val('');renderRecords();});
    $(document).on('click','.btn-edit',function(){ openEditRecord($(this).data('id')); }); $(document).on('click','.btn-copy',function(){ openCopyRecord($(this).data('id')); }); $(document).on('click','.btn-delete',function(){ deleteRecord($(this).data('id')); }); $(document).on('click','.btn-history',function(){ openHistory($(this).data('person')); });
    $('#btnSaveSettings').on('click',saveSettings);
    $('#btnDownloadJson').on('click',()=>{ const blob=new Blob([JSON.stringify(state.data,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='data.json'; a.click(); URL.revokeObjectURL(a.href); });
    $('#btnAddPerson').on('click',()=>{ const name=$('#personNameInput').val().trim(); if(!name)return; const p=findOrCreatePersonIn(state.data,name,$('#personRelationInput').val()); p.relation=$('#personRelationInput').val(); $('#personNameInput').val(''); renderPeopleManager(); saveAndRender(true); });
    $(document).on('input change','.person-name,.person-relation',function(){ const id=$(this).data('id'), p=state.data.people.find(x=>x.id===id); if(!p)return; const oldName=p.name; p.name=$(`.person-name[data-id="${id}"]`).val(); p.relation=$(`.person-relation[data-id="${id}"]`).val(); state.data.records.forEach(r=>{ if(r.personId===id||r.personName===oldName){r.personId=id;r.personName=p.name;r.relation=p.relation; delete r.group;} }); saveAndRender(false); });
    $(document).on('click','.btn-remove-person',function(){ const id=$(this).data('id'); state.data.people=state.data.people.filter(p=>p.id!==id); renderPeopleManager(); saveAndRender(true); });
    $('#btnAddRelation').on('click',()=>{ const v=$('#relationInput').val().trim(); if(v&&!state.data.relationOptions.includes(v)) state.data.relationOptions.push(v); $('#relationInput').val(''); renderOptionsManager(); saveAndRender(true); });
    $(document).on('change','.relation-option',function(){ const old=$(this).data('old'), val=$(this).val().trim(); if(!val)return; const i=state.data.relationOptions.indexOf(old); if(i>=0)state.data.relationOptions[i]=val; state.data.people.forEach(p=>{if(p.relation===old)p.relation=val;}); state.data.records.forEach(r=>{if(r.relation===old)r.relation=val;}); renderOptionsManager(); saveAndRender(true); });
    $(document).on('click','.btn-remove-relation',function(){ const v=$(this).data('value'); state.data.relationOptions=state.data.relationOptions.filter(x=>x!==v); renderOptionsManager(); saveAndRender(true); });
    $('#btnAddCategory').on('click',()=>{ const zh=$('#categoryZhInput').val().trim(), en=$('#categoryEnInput').val().trim(); let code=$('#categoryCodeInput').val().trim()||'category_'+Date.now(); if(!zh&&!en)return; state.data.categoryTypes.push({code,zh:zh||code,en:en||zh||code,defaultDirection:$('#categoryDirectionInput').val()||'given'}); $('#categoryCodeInput,#categoryZhInput,#categoryEnInput').val(''); renderCategoryManager(); saveAndRender(true); });
    $(document).on('change','.category-code,.category-zh,.category-en,.category-direction',function(){ const old=$(this).data('code'), c=state.data.categoryTypes.find(x=>x.code===old); if(!c)return; const newCode=$(`.category-code[data-code="${old}"]`).val().trim()||old; if(newCode!==old){ state.data.records.forEach(r=>{if(r.category===old)r.category=newCode;}); state.data.deletedRecords.forEach(r=>{if(r.category===old)r.category=newCode;}); c.code=newCode; } c.zh=$(`.category-zh[data-code="${old}"]`).val(); c.en=$(`.category-en[data-code="${old}"]`).val(); c.defaultDirection=$(`.category-direction[data-code="${old}"]`).val()||'given'; renderCategoryManager(); saveAndRender(true); });
    $(document).on('click','.btn-remove-category',function(){ const code=$(this).data('code'); const used=state.data.records.some(r=>r.category===code)||state.data.deletedRecords.some(r=>r.category===code); if(used){ setStatus(`${t('category')} ${code} is in use`, 'warn'); return; } state.data.categoryTypes=state.data.categoryTypes.filter(c=>c.code!==code); renderCategoryManager(); saveAndRender(true); });
    $('#btnAddEventType').on('click',()=>{ const zh=$('#eventZhInput').val().trim(), en=$('#eventEnInput').val().trim(); let code=$('#eventCodeInput').val().trim()||'event_'+Date.now(); if(!zh&&!en)return; state.data.eventTypes.push({code,zh:zh||code,en:en||zh||code}); $('#eventCodeInput,#eventZhInput,#eventEnInput').val(''); renderEventManager(); saveAndRender(true); });
    $(document).on('change','.event-code,.event-zh,.event-en',function(){ const old=$(this).data('code'), e=state.data.eventTypes.find(x=>x.code===old); if(!e)return; const newCode=$(`.event-code[data-code="${old}"]`).val().trim()||old; if(newCode!==old){ state.data.records.forEach(r=>{if(r.eventType===old)r.eventType=newCode;}); e.code=newCode; } e.zh=$(`.event-zh[data-code="${old}"]`).val(); e.en=$(`.event-en[data-code="${old}"]`).val(); renderEventManager(); saveAndRender(true); }); $(document).on('click','.btn-remove-event',function(){ const code=$(this).data('code'); state.data.eventTypes=state.data.eventTypes.filter(e=>e.code!==code); renderEventManager(); saveAndRender(true); });
    $('#btnAddRule').on('click',()=>{ const name=$('#ruleNameInput').val().trim(); if(!name)return; state.data.redPacketRules.push({id:uid('rp'),name,amount:num($('#ruleAmountInput').val()),currency:($('#ruleCurrencyInput').val()||state.data.settings.defaultCurrency||'CNY').toUpperCase()}); $('#ruleNameInput,#ruleAmountInput,#ruleCurrencyInput').val(''); renderRuleManager(); saveAndRender(true); }); $(document).on('input change','.rule-name,.rule-amount,.rule-currency',function(){ const id=$(this).data('id'), r=state.data.redPacketRules.find(x=>x.id===id); if(!r)return; r.name=$(`.rule-name[data-id="${id}"]`).val(); r.amount=num($(`.rule-amount[data-id="${id}"]`).val()); r.currency=($(`.rule-currency[data-id="${id}"]`).val()||'CNY').toUpperCase(); saveAndRender(false); }); $(document).on('click','.btn-remove-rule',function(){ const id=$(this).data('id'); state.data.redPacketRules=state.data.redPacketRules.filter(r=>r.id!==id); renderRuleManager(); saveAndRender(true); });
    $('#btnAddRate').on('click',()=>{ const c=($('#rateCurrencyInput').val()||'').trim().toUpperCase(), v=num($('#rateValueInput').val()); if(c&&v>0)state.data.settings.exchangeRates[c]=v; $('#rateCurrencyInput,#rateValueInput').val(''); renderRates(); saveAndRender(true); }); $(document).on('change','.rate-currency,.rate-value',function(){ const old=$(this).data('old'), c=($(`.rate-currency[data-old="${old}"]`).val()||old).trim().toUpperCase(), v=num($(`.rate-value[data-old="${old}"]`).val()); delete state.data.settings.exchangeRates[old]; if(c&&v>0)state.data.settings.exchangeRates[c]=v; renderRates(); saveAndRender(true); }); $(document).on('click','.btn-remove-rate',function(){ delete state.data.settings.exchangeRates[$(this).data('currency')]; renderRates(); saveAndRender(true); });
    $(document).on('click','.btn-restore',function(){ const id=$(this).data('id'), i=state.data.deletedRecords.findIndex(r=>r.id===id); if(i<0)return; const [r]=state.data.deletedRecords.splice(i,1); delete r.deletedAt; state.data.records.push(r); renderTrash(); saveAndRender(true); }); $(document).on('click','.btn-permanent',function(){ if(!confirm(t('confirmPermanent')))return; const id=$(this).data('id'); state.data.deletedRecords=state.data.deletedRecords.filter(r=>r.id!==id); renderTrash(); saveAndRender(true); }); $('#btnClearTrash').on('click',()=>{ if(!confirm(t('confirmClearTrash')))return; state.data.deletedRecords=[]; renderTrash(); saveAndRender(true); });
    let lastTouchEnd=0; document.addEventListener('touchend',e=>{const n=Date.now(); if(n-lastTouchEnd<=300)e.preventDefault(); lastTouchEnd=n;},{passive:false});
  }
  async function init(){ bindEvents(); await loadStaticDataJson(); renderAll(); if(hasCloudConfig()) await loadCloudData(true); else { renderAll(); setStatus(t('noCloudBootstrap'),'warn'); } }
  init();
})();
