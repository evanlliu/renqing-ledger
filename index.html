<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="人情账" />
  <meta name="theme-color" content="#f7f8fb" />
  <link rel="apple-touch-icon" sizes="180x180" href="./app-icon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="./app-icon-192.png" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <title>人情账 · Gift Ledger</title>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <style>
    :root {
      --bg:#f7f8fb; --card:rgba(255,255,255,.94); --solid:#fff; --text:#172033; --muted:#6f7787;
      --line:#e7eaf0; --primary:#2563eb; --primary-soft:#e8f0ff; --green:#16a34a; --green-soft:#eaf8ef;
      --red:#dc2626; --red-soft:#fff0f0; --yellow-soft:#fff7df; --shadow:0 10px 30px rgba(15,23,42,.08);
      --radius:18px; --safe-top:env(safe-area-inset-top,0px); --safe-bottom:env(safe-area-inset-bottom,0px);
    }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html, body { width:100%; min-height:100%; max-width:100%; overflow-x:hidden; background:var(--bg); color:var(--text); }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,"PingFang SC","Microsoft YaHei",sans-serif; touch-action:pan-y; overscroll-behavior-x:none; }
    body.modal-open { overflow:hidden; position:fixed; width:100%; left:0; right:0; }
    button,input,select,textarea { font:inherit; font-size:16px; min-width:0; max-width:100%; touch-action:manipulation; }
    input[type="date"], input[type="datetime-local"], input[type="month"], input[type="time"] { width:100%; min-width:0!important; max-width:100%!important; inline-size:100%; max-inline-size:100%; box-sizing:border-box; -webkit-appearance:none; appearance:none; }
    input[type="date"]::-webkit-date-and-time-value, input[type="datetime-local"]::-webkit-date-and-time-value, input[type="month"]::-webkit-date-and-time-value, input[type="time"]::-webkit-date-and-time-value { text-align:left; min-width:0; }
    input[type="date"]::-webkit-calendar-picker-indicator { margin-left:4px; flex-shrink:0; }
    button { border:none; cursor:pointer; }
    .app-shell { width:100%; max-width:1240px; margin:0 auto; padding:calc(14px + var(--safe-top)) 16px calc(82px + var(--safe-bottom)); overflow-x:hidden; }
    .topbar { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; margin-bottom:7px; position:relative; }
    .brand { min-width:0; }
    .brand-title { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .brand h1 { margin:0; font-size:24px; letter-spacing:-.03em; }
    .version { color:var(--muted); font-size:13px; font-weight:800; flex:0 0 auto; }
    .toolbar { display:flex; align-items:center; gap:8px; flex-shrink:0; }
    .btn { min-height:38px; padding:8px 12px; border-radius:12px; background:var(--solid); color:var(--text); border:1px solid var(--line); box-shadow:0 1px 0 rgba(15,23,42,.03); font-weight:800; display:inline-flex; align-items:center; justify-content:center; gap:6px; }
    .btn.primary { background:var(--primary); color:#fff; border-color:var(--primary); }
    .btn.soft { background:var(--primary-soft); color:var(--primary); border-color:#cfe0ff; }
    .btn.danger { background:var(--red-soft); color:var(--red); border-color:#ffd6d6; }
    .btn.ghost { background:transparent; border-color:transparent; box-shadow:none; }
    .icon-btn { width:40px; min-width:40px; padding:0; font-size:18px; }
    .more-menu { position:absolute; right:0; top:46px; width:240px; z-index:80; display:none; padding:8px; border:1px solid var(--line); background:var(--solid); border-radius:16px; box-shadow:var(--shadow); }
    .more-menu.open { display:grid; gap:6px; }
    .more-menu .btn { width:100%; justify-content:flex-start; }
    .sync-line { display:flex; align-items:center; gap:8px; min-height:34px; padding:7px 10px; border:1px solid var(--line); border-radius:14px; background:rgba(255,255,255,.75); color:var(--muted); font-size:13px; margin-bottom:10px; overflow:hidden; }
    .top-sync { margin-bottom:0; min-height:28px; max-width:420px; padding:5px 9px; font-size:12px; background:rgba(255,255,255,.82); }
    .filter-icon-btn { min-height:30px; width:34px; min-width:34px; border-radius:12px; font-size:15px; background:var(--primary-soft); color:var(--primary); border-color:#cfe0ff; }
    .sync-dot { width:8px; height:8px; border-radius:99px; background:#94a3b8; flex:0 0 auto; }
    .sync-dot.ok{background:var(--green)} .sync-dot.warn{background:#f59e0b} .sync-dot.err{background:var(--red)}
    .sync-text { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .cards { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:8px; margin-bottom:6px; }
    .stat-card { background:linear-gradient(180deg,#ffffff 0%,#fbfdff 100%); border:1px solid var(--line); border-radius:var(--radius); padding:12px; box-shadow:0 8px 20px rgba(15,23,42,.05); min-height:76px; }
    .stat-label { color:var(--muted); font-size:12px; font-weight:800; margin-bottom:8px; }
    .stat-value { font-size:18px; line-height:1.2; font-weight:950; letter-spacing:-.02em; word-break:break-word; }
    .stat-card.in .stat-value{color:var(--green)} .stat-card.out .stat-value{color:var(--red)} .stat-card.net .stat-value{color:var(--primary)}
    .panel { background:var(--card); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); }
    .filter-panel { display:none; position:fixed; left:50%; top:76px; transform:translateX(-50%); width:min(980px,calc(100vw - 32px)); z-index:61; padding:14px; border-radius:20px; box-shadow:0 20px 60px rgba(15,23,42,.18); }
    .filter-panel.open { display:block; }
    .filter-backdrop { position:fixed; inset:0; background:rgba(15,23,42,.18); z-index:60; display:none; }
    .filter-backdrop.open { display:block; }
    .filter-grid { display:grid; grid-template-columns:1.2fr .75fr .75fr .85fr .85fr auto; gap:8px; align-items:end; }
    .field { display:grid; gap:5px; min-width:0; max-width:100%; }
    .field > .input,.field > .select,.field > .textarea { min-width:0; max-width:100%; }
    .field label { color:var(--muted); font-size:12px; font-weight:850; }
    .input,.select,.textarea { width:100%; max-width:100%; border:1px solid var(--line); background:#fff; color:var(--text); border-radius:12px; padding:10px 11px; outline:none; min-height:42px; }
    .input[readonly] { color:#475569; background:#f8fafc; }
    .textarea { min-height:86px; resize:vertical; }
    .input:focus,.select:focus,.textarea:focus { border-color:#93b4ff; box-shadow:0 0 0 3px rgba(37,99,235,.10); }
    .table-card { overflow:hidden; }
    .table-tools { display:flex; align-items:center; justify-content:space-between; gap:8px; padding:12px; border-bottom:1px solid var(--line); }
    .table-title { font-weight:950; }
    .record-title-row { display:flex; align-items:baseline; gap:7px; flex-wrap:wrap; }
    .table-count { color:var(--muted); font-size:13px; }
    .table-wrap { overflow-x:auto; }
    table { width:100%; border-collapse:collapse; min-width:1100px; }
    th,td { padding:10px 12px; border-bottom:1px solid var(--line); text-align:left; vertical-align:middle; white-space:nowrap; }
    th { color:var(--muted); font-size:12px; background:#fbfcff; position:sticky; top:0; z-index:1; }
    td { font-size:14px; }
    .badge { display:inline-flex; align-items:center; gap:4px; padding:4px 8px; border-radius:999px; font-size:12px; font-weight:850; }
    .badge.received{color:var(--green);background:var(--green-soft)} .badge.given{color:var(--red);background:var(--red-soft)} .badge.holiday{color:#9a6400;background:var(--yellow-soft)} .badge.red_packet{color:#be123c;background:#fff1f4}
    .amount.in { color:var(--green); font-weight:950; } .amount.out { color:var(--red); font-weight:950; }
    .row-actions { display:flex; gap:6px; flex-wrap:wrap; }
    .mini-btn { padding:6px 8px; border-radius:10px; border:1px solid var(--line); background:#fff; color:var(--text); font-weight:850; }
    .mini-btn.danger { color:var(--red); background:var(--red-soft); border-color:#ffd6d6; }
    .mobile-list { display:none; gap:7px; width:100%; overflow-x:hidden; }
    .mobile-card { width:100%; max-width:100%; background:var(--card); border:1px solid var(--line); border-radius:18px; padding:12px; box-shadow:0 6px 20px rgba(15,23,42,.04); overflow:hidden; }
    .mobile-card-top { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; margin-bottom:5px; }
    .person-title { font-size:16px; font-weight:950; letter-spacing:-.02em; word-break:break-word; }
    .person-title-row { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }\n    .relation-chip { display:inline-flex; align-items:center; border-radius:999px; padding:2px 7px; font-size:11px; font-weight:850; color:#475569; background:#eef2f7; line-height:1.35; }
    .mobile-meta { color:var(--muted); font-size:12px; margin-top:2px; word-break:break-word; }
    .mobile-amount { font-size:16px; font-weight:950; white-space:nowrap; }
    .mobile-info { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:5px; margin:6px 0 4px; }
    .mobile-card.swipe-row { position:relative; overflow:hidden; padding:0; }
    .mobile-card-body { padding:9px 10px; transition:transform .18s ease; }
    .mobile-card-actions { position:absolute; top:0; right:0; bottom:0; width:148px; display:grid; grid-template-columns:1fr 1fr; gap:6px; padding:9px; background:linear-gradient(180deg,#f8fbff 0%,#eef4ff 100%); border-left:1px solid #dbe7ff; opacity:0; transform:translateX(148px); transition:transform .18s ease, opacity .18s ease; align-content:center; }
    .mobile-card.swipe-open .mobile-card-body { transform:translateX(-144px); }
    .mobile-card.swipe-open .mobile-card-actions { transform:translateX(0); opacity:1; }
    .mobile-card-action-btn { min-height:34px; border-radius:10px; border:1px solid var(--line); background:#fff; font-size:12px; font-weight:900; }
    .mobile-card-action-btn.danger { color:var(--red); background:var(--red-soft); border-color:#ffd6d6; }
    .info-box { border-radius:12px; background:#f8fafc; padding:5px 6px; min-width:0; }
    .info-label { color:var(--muted); font-size:10px; font-weight:850; margin-bottom:1px; }
    .info-value { font-weight:850; font-size:12px; word-break:break-word; line-height:1.2; }
    .empty { text-align:center; padding:32px 12px; color:var(--muted); }
    .modal-mask { position:fixed; inset:0; z-index:100; display:none; align-items:center; justify-content:center; background:rgba(15,23,42,.45); padding:calc(16px + var(--safe-top)) 16px calc(16px + var(--safe-bottom)); }
    .modal-mask.open { display:flex; touch-action:none; overscroll-behavior:contain; }
    .modal { width:min(780px,100%); max-height:min(88dvh,840px); overflow:hidden; overscroll-behavior:contain; background:var(--solid); border-radius:22px; box-shadow:0 20px 60px rgba(15,23,42,.25); display:grid; grid-template-rows:auto 1fr auto; }
    .modal.large { width:min(1080px,100%); }
    .modal-head { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:14px 16px; border-bottom:1px solid var(--line); }
    .modal-title { font-size:18px; font-weight:950; }
    .modal-body { padding:14px 16px; overflow:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; max-width:100%; overscroll-behavior:contain; touch-action:pan-y; }
    .modal-body * { max-width:100%; }
    .modal-foot { display:flex; justify-content:flex-end; gap:8px; padding:12px 16px; border-top:1px solid var(--line); background:#fbfcff; flex-wrap:wrap; }
    .form-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px; }
    .form-grid .full { grid-column:1/-1; }
    .section-title { margin:18px 0 8px; font-size:15px; font-weight:950; color:#334155; }
    .manager-list { display:grid; gap:8px; margin-top:12px; }
    .manager-row { display:grid; grid-template-columns:1fr 1fr 1fr auto; gap:8px; align-items:center; padding:8px; border:1px solid var(--line); border-radius:14px; background:#fbfcff; }
    .manager-row > * { transition:transform .18s ease; }
    .swipe-delete { white-space:nowrap; }
    .drag-handle { display:none; border:1px solid var(--line); background:#fff; color:var(--muted); border-radius:12px; min-height:38px; align-items:center; justify-content:center; font-size:20px; font-weight:950; cursor:grab; user-select:none; -webkit-user-select:none; touch-action:none; }
    .drag-handle:active { cursor:grabbing; }
    .manager-row.dragging { opacity:.78; box-shadow:0 14px 34px rgba(37,99,235,.18); border-color:rgba(37,99,235,.35); }
    .people-row { grid-template-columns:1fr 1fr auto; }
    .option-row { grid-template-columns:1fr auto; }
    .event-row { grid-template-columns:.8fr 1fr 1fr auto; }
    .category-row { grid-template-columns:.75fr 1fr 1fr .85fr auto; }
    .rule-row { grid-template-columns:1fr .8fr .8fr auto; }
    .option-row { grid-template-columns:1fr auto; }
    .rate-row { grid-template-columns:1fr 1fr auto; }
    .history-row,.trash-row { display:grid; grid-template-columns:.8fr 1fr 1fr .8fr .8fr auto; gap:8px; align-items:center; padding:8px; border:1px solid var(--line); border-radius:14px; background:#fbfcff; font-size:13px; }
    .chart-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .chart-box { border:1px solid var(--line); border-radius:16px; padding:12px; background:#fbfcff; min-width:0; }
    .chart-title { font-weight:950; margin-bottom:10px; }
    .bar-row { display:grid; grid-template-columns:120px 1fr auto; gap:8px; align-items:center; margin:8px 0; font-size:13px; }
    .bar-name { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:#334155; }
    .bar-track { height:12px; border-radius:99px; background:#e5e7eb; overflow:hidden; }
    .bar-fill { height:100%; border-radius:99px; background:var(--primary); min-width:2px; }
    .bar-value { color:var(--muted); white-space:nowrap; }
    .float-actions { display:none; }
    body.mobile-actions-hidden .float-actions { display:none!important; }
    .mobile-filter-btn { display:none; }
    .hidden { display:none!important; }
    #importFile { display:none; }
    @media (max-width:980px){ .cards{grid-template-columns:repeat(2,minmax(0,1fr));} .filter-grid{grid-template-columns:repeat(3,minmax(0,1fr));} .chart-grid{grid-template-columns:1fr;} }
    @media (max-width:720px){
      .app-shell { padding:max(2px, calc(var(--safe-top) - 12px)) 10px calc(76px + var(--safe-bottom)); }
      .topbar { align-items:flex-start; margin-bottom:4px; }
      .brand h1 { font-size:20px; }
      .brand-title { gap:6px; }
      .top-sync { max-width:calc(100vw - 178px); min-height:26px; padding:4px 7px; font-size:11px; }
      .filter-icon-btn { width:34px; min-width:34px; height:34px; min-height:34px; padding:0; border-radius:12px; font-size:16px; align-self:center; }
      .toolbar .text-label { display:none; } .toolbar{gap:6px;} .btn{min-height:36px;padding:7px 9px;border-radius:11px;} .icon-btn{width:38px;min-width:38px;}
      .cards { grid-template-columns:repeat(2,minmax(0,1fr)); gap:6px; margin-bottom:2px; }
      .stat-card { padding:9px 10px; min-height:64px; border-radius:16px; }
      .stat-value { font-size:15px; }
      .filter-panel { left:10px; right:10px; top:max(48px, calc(var(--safe-top) + 36px)); width:auto; transform:none; padding:14px; border-radius:20px; box-shadow:0 20px 60px rgba(15,23,42,.22); }
      .filter-backdrop { background:rgba(15,23,42,.28); }
      .filter-grid { grid-template-columns:1fr 1fr; }
      .filter-grid .filter-keyword { grid-column:1/-1; }
      .desktop-table { display:none; }
      .mobile-list { display:grid; }
      .table-card { background:transparent; border:none; box-shadow:none; width:100%; overflow-x:hidden; }
      .table-tools { background:var(--card); border:1px solid var(--line); border-radius:16px; margin-top:0; margin-bottom:9px; padding:7px 10px; position:sticky; top:calc(6px + var(--safe-top)); z-index:20; backdrop-filter:blur(8px); }
      .mobile-filter-btn { display:inline-flex; }
      .modal-mask { padding:0; align-items:stretch; }
      .modal,.modal.large { width:100%; min-height:100dvh; max-height:100dvh; border-radius:0; }
      .modal-head { padding-top:calc(12px + var(--safe-top)); }
      .modal-foot { padding-bottom:calc(12px + var(--safe-bottom)); }
      .form-grid { grid-template-columns:1fr; gap:10px; }
      .manager-row,.event-row,.category-row,.rule-row,.option-row,.rate-row,.history-row,.trash-row { grid-template-columns:1fr; }
      .manager-row.swipe-row { position:relative; overflow:hidden; touch-action:pan-y; padding-right:8px; }
      .manager-row.swipe-row { grid-template-columns:42px minmax(0,1fr)!important; align-items:start; }
      .manager-row.swipe-row .drag-handle { display:flex; grid-column:1; grid-row:1; width:38px; height:38px; min-height:38px; align-self:start; margin-top:2px; }
      .manager-row.swipe-row > :not(.drag-handle):not(.swipe-delete) { grid-column:2; min-width:0; }
      .manager-row.swipe-row.dragging { z-index:3; }
      .manager-row.swipe-row .swipe-delete { position:absolute; top:12px; right:8px; width:92px; min-height:40px; opacity:0; transform:translateX(112px); z-index:2; }
      .manager-row.swipe-row.swipe-open .swipe-delete { opacity:1; transform:translateX(0); }
      .manager-row.swipe-row.swipe-open > :not(.swipe-delete) { transform:translateX(-104px); }
      .manager-row.swipe-row .input,.manager-row.swipe-row .select { min-width:0; }
      .input[type="date"],.input[type="datetime-local"],.input[type="month"],.input[type="time"] { width:100%!important; min-width:0!important; max-width:100%!important; padding-left:10px; padding-right:6px; }
      .float-actions { position:fixed; right:12px; bottom:calc(14px + var(--safe-bottom)); z-index:40; display:grid; gap:8px; }
      .float-actions .btn { width:46px; height:46px; min-height:46px; border-radius:16px; font-size:20px; box-shadow:var(--shadow); }
      .topbar .toolbar { display:none; }
      .more-menu { position:fixed; right:12px; bottom:calc(216px + var(--safe-bottom)); top:auto; width:240px; max-height:56vh; overflow:auto; z-index:80; }
      .bar-row { grid-template-columns:88px 1fr; }
      .mobile-card { border-radius:15px; }
      .mobile-card-top { align-items:center; }
      .mobile-amount { font-size:15px; }
      .float-actions { right:10px; bottom:calc(12px + var(--safe-bottom)); }
      .float-actions .btn { width:44px; height:44px; min-height:44px; border-radius:15px; }
      .bar-value { grid-column:2; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-title">
          <h1 data-i18n="appTitle">人情账</h1>
          <span class="version">v1.2.18</span>
          <div class="sync-line top-sync"><span class="sync-dot" id="syncDot"></span><span class="sync-text" id="syncText">Loading...</span></div>
          <button class="btn icon-btn filter-icon-btn" id="btnFilter" type="button" title="Filter">🔎</button>
        </div>
      </div>
      <div class="toolbar">
        <button class="btn soft" id="btnLang">🌐 <span class="text-label">中文</span></button>
        <button class="btn soft" id="btnSync">↻ <span class="text-label" data-i18n="sync">同步</span></button>
        <button class="btn primary" id="btnAdd">＋ <span class="text-label" data-i18n="addRecord">新增</span></button>
        <button class="btn icon-btn" id="btnMore">⋯</button>
      </div>
      <div class="more-menu" id="moreMenu">
        <button class="btn ghost" id="btnSettings">⚙️ <span data-i18n="settings">设置</span></button>
        <button class="btn ghost" id="btnPeople">👥 <span data-i18n="peopleManage">人员管理</span></button>
        <button class="btn ghost" id="btnOptions">🧩 <span data-i18n="optionManage">关系配置</span></button>
        <button class="btn ghost" id="btnCategories">📂 <span data-i18n="categoryManage">分类配置</span></button>
        <button class="btn ghost" id="btnEvents">🏷️ <span data-i18n="eventManage">类型管理</span></button>
        <button class="btn ghost" id="btnRules">🧧 <span data-i18n="ruleManage">红包规则</span></button>
        <button class="btn ghost" id="btnRates">💱 <span data-i18n="rateManage">汇率设置</span></button>
        <button class="btn ghost" id="btnCharts">📊 <span data-i18n="chartStats">统计图表</span></button>
        <button class="btn ghost" id="btnTrash">♻️ <span data-i18n="trash">回收站</span></button>
        <button class="btn ghost" id="btnExportCsv">📤 <span data-i18n="exportCsv">导出CSV</span></button>
        <button class="btn ghost" id="btnImportCsv">📥 <span data-i18n="importCsv">导入CSV</span></button>
        <button class="btn ghost" id="btnDownloadJson">⬇️ <span data-i18n="downloadData">下载数据</span></button>
      </div>
    </header>

    <section class="cards" id="statsCards"></section>
    <div class="filter-backdrop" id="filterBackdrop"></div>

    <section class="filter-panel panel" id="filterPanel">
      <div class="filter-grid">

  function parseCsv(text){ const rows=[]; let row=[], cur='', q=false; for(let i=0;i<text.length;i++){ const ch=text[i], nx=text[i+1]; if(q){ if(ch==='"'&&nx==='"'){cur+='"';i++;} else if(ch==='"') q=false; else cur+=ch; } else { if(ch==='"') q=true; else if(ch===','){row.push(cur);cur='';} else if(ch==='\n'){row.push(cur);rows.push(row);row=[];cur='';} else if(ch!=='\r') cur+=ch; } } row.push(cur); rows.push(row); return rows.filter(r=>r.some(c=>String(c).trim()!=='')); }

  function reorderConfigByKeys(kind, keys){
    const unique=Array.from(new Set(keys.filter(Boolean)));
    const byKey=(arr,fn)=>unique.map(k=>arr.find(x=>fn(x)===k)).filter(Boolean).concat(arr.filter(x=>!unique.includes(fn(x))));
    if(kind==='people') state.data.people=byKey(state.data.people,x=>x.id);
    else if(kind==='relations') state.data.relationOptions=unique.concat(state.data.relationOptions.filter(x=>!unique.includes(x)));
    else if(kind==='categories') state.data.categoryTypes=byKey(state.data.categoryTypes,x=>x.code);
    else if(kind==='events') state.data.eventTypes=byKey(state.data.eventTypes,x=>x.code);
    else if(kind==='rules') state.data.redPacketRules=byKey(state.data.redPacketRules,x=>x.id);
    else if(kind==='rates'){
      const old=state.data.settings.exchangeRates||{}, next={};
      unique.forEach(k=>{ if(Object.prototype.hasOwnProperty.call(old,k)) next[k]=old[k]; });
      Object.keys(old).forEach(k=>{ if(!Object.prototype.hasOwnProperty.call(next,k)) next[k]=old[k]; });

    }
  }

    function updateFloatingActionsVisibility(){ const hide=window.matchMedia('(max-width:720px)').matches && $('.mobile-card.swipe-open').length>0; document.body.classList.toggle('mobile-actions-hidden', hide); }
    let swipeStartX=0, swipeStartY=0, swipeTarget=null, swipeStartedOnField=false;
    $(document).on('touchstart','.swipe-row',function(e){
      if($(e.target).closest('.drag-handle,.mobile-card-action-btn,.swipe-delete,.btn,.mini-btn,button').length) return;
      const t=e.originalEvent.touches&&e.originalEvent.touches[0];
      if(!t) return;
      swipeStartX=t.clientX;
      swipeStartY=t.clientY;
      swipeTarget=this;
      swipeStartedOnField=!!$(e.target).closest('input,select,textarea').length;
    });
    $(document).on('touchmove','.swipe-row',function(e){
      if(!swipeTarget||swipeTarget!==this) return;
      const t=e.originalEvent.touches&&e.originalEvent.touches[0];
      if(!t) return;
      const dx=t.clientX-swipeStartX, dy=t.clientY-swipeStartY;
      if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>18){
        if(swipeStartedOnField && e.cancelable) e.preventDefault();
        if(dx<0){
          $('.swipe-row').not(this).removeClass('swipe-open');
          $(this).addClass('swipe-open');
        }else if(dx>0){
          $(this).removeClass('swipe-open');
        }
        updateFloatingActionsVisibility();
      }
    });
    $(document).on('touchend','.swipe-row',function(e){
      if(!swipeTarget||swipeTarget!==this) return;
      const t=e.originalEvent.changedTouches&&e.originalEvent.changedTouches[0];
      if(!t){ swipeTarget=null; swipeStartedOnField=false; return; }
      const dx=t.clientX-swipeStartX, dy=t.clientY-swipeStartY;
      if(Math.abs(dx)>Math.abs(dy)&&dx<-45){
        $('.swipe-row').not(this).removeClass('swipe-open');
        $(this).addClass('swipe-open');
      }else if(Math.abs(dx)>Math.abs(dy)&&dx>30){
        $(this).removeClass('swipe-open');
      }
      updateFloatingActionsVisibility();
      swipeTarget=null;
      swipeStartedOnField=false;
    });
    $(document).on('click','.manager-row.swipe-row input,.manager-row.swipe-row select,.manager-row.swipe-row textarea',function(){
      $('.manager-row.swipe-row').not($(this).closest('.manager-row')).removeClass('swipe-open');
      updateFloatingActionsVisibility();
    });
    $(document).on('click','.swipe-delete,.mobile-card-action-btn',function(){
      $(this).closest('.swipe-row').removeClass('swipe-open');
      updateFloatingActionsVisibility();
    });
    let sortState=null;
    $(document).on('pointerdown','.drag-handle',function(e){
      if(!window.matchMedia('(max-width:720px)').matches) return;
      e.preventDefault(); e.stopPropagation();
      const row=$(this).closest('.sortable-row')[0], list=$(row).parent()[0];
      $('.manager-row.swipe-row').removeClass('swipe-open');
      sortState={row,list,startY:e.clientY};
      row.classList.add('dragging');
      try{ this.setPointerCapture(e.originalEvent.pointerId); }catch(_e){}
    });
    $(document).on('pointermove',function(e){
      if(!sortState) return;
      e.preventDefault();
      const y=e.clientY, row=sortState.row, list=sortState.list;
      const rows=Array.from(list.querySelectorAll('.sortable-row')).filter(x=>x!==row);
      let placed=false;
      for(const target of rows){
        const rect=target.getBoundingClientRect();
        if(y < rect.top + rect.height/2){ list.insertBefore(row,target); placed=true; break; }
      }
      if(!placed) list.appendChild(row);
    });
    $(document).on('pointerup pointercancel',function(){
      if(!sortState) return;
      const {row,list}=sortState;
      row.classList.remove('dragging');
      sortState=null;
      saveManagerOrder(list);
    });
  }
